databases:
  - name: imperium-tracking-db
    plan: starter
    databaseName: imperium_tracking
    user: imperium_tracking_user

services:
  - type: web
    name: imperium-tracking-server
    env: docker
    dockerContext: ./imperium-tracking-server
    dockerfilePath: ./imperium-tracking-server/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: imperium-tracking-db
          property: connectionString
      - key: TRACKING_PUBLIC_KEY
        generateValue: true
      - key: ADMIN_PRIVATE_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: imperium-admin
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: ADMIN_SESSION_HOURS
        value: "12"
      - key: IP_HASH_SALT
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: INGEST_RATE_WINDOW_MS
        value: "60000"
      - key: INGEST_RATE_MAX
        value: "120"
